<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Application Sent - Lake Park Realty</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171717;
      --muted: #616161;
      --accent: #f4dd19;
      --panel: #ffffff;
      --soft: #f4f4f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.96), rgba(24, 24, 24, 0.92) 58%, rgba(244, 221, 25, 0.82)),
        var(--soft);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(640px, 100%);
      background: var(--panel);
      border-top: 7px solid var(--accent);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.18);
      padding: clamp(24px, 5vw, 44px);
      text-align: center;
    }

    img {
      width: min(330px, 100%);
      height: auto;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 46px);
      letter-spacing: 0;
    }

    p {
      margin: 0 auto 24px;
      color: var(--muted);
      line-height: 1.55;
      max-width: 500px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 6px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }

    a:hover {
      background: #343434;
    }
  </style>
</head>
<body>
  <main>
    <img src="assets/lake-park-realty-logo.jpeg" alt="Lake Park Realty - Improving Our Neighborhoods">
    <h1>Application Sent</h1>
    <p>Thank you. Your rental application has been submitted to Lake Park Realty.</p>
    <a href="index.html">Back to Application</a>
  </main>
</body>
</html>
